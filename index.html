<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png">  
<title>發票稅金計算機</title>

<style>

body{
font-family:sans-serif;
background:#f3f3f3;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:360px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-bottom:5px;
font-size:14px;
}

input,
select,
button{
width:100%;
height:42px;
box-sizing:border-box;
font-size:16px;
margin-bottom:14px;
padding:8px 10px;
}

button{
cursor:pointer;
}

.result{
margin-top:10px;
background:#f8f8f8;
padding:12px;
border-radius:8px;
white-space:pre-line;
min-height:50px;
}

</style>

</head>

<body>

<div class="box">

<h2>發票稅金計算</h2>

<label>稅率</label>
<select id="taxRate" onchange="recalculate()">
<option value="0.05">5%</option>
<option value="0.10">10%</option>
<option value="0">免稅</option>
</select>

<label>未稅金額</label>
<input id="untaxed" type="number" oninput="calcFromUntaxed()">

<label>稅金</label>
<input id="tax" type="number" readonly>

<label>含稅金額</label>
<input id="total" type="number" oninput="calcFromTotal()">

<button onclick="generateCustomerText()">產生客戶訊息</button>
<button onclick="copyResult()">複製訊息</button>
<button onclick="clearAll()">清空</button>

<div id="result" class="result"></div>

</div>

<script>

function getRate(){
return parseFloat(document.getElementById("taxRate").value)
}

function calcFromUntaxed(){

let rate = getRate()

let untaxed = parseFloat(document.getElementById("untaxed").value)

if(!untaxed && untaxed!==0) return

let tax = Math.round(untaxed * rate)
let total = untaxed + tax

document.getElementById("tax").value = tax
document.getElementById("total").value = total

}

function calcFromTotal(){

let rate = getRate()

let total = parseFloat(document.getElementById("total").value)

if(!total && total!==0) return

if(rate===0){

document.getElementById("untaxed").value = total
document.getElementById("tax").value = 0
return

}

let untaxed = Math.round(total / (1+rate))
let tax = total - untaxed

document.getElementById("untaxed").value = untaxed
document.getElementById("tax").value = tax

}

function recalculate(){

let untaxed = document.getElementById("untaxed").value

if(untaxed){
calcFromUntaxed()
}

}

function generateCustomerText(){

let rate = getRate()*100

let untaxed = document.getElementById("untaxed").value
let tax = document.getElementById("tax").value
let total = document.getElementById("total").value

let text =
"金額說明\n"+
"未稅金額："+untaxed+"\n"+
"稅金("+rate+"%)："+tax+"\n"+
"含稅金額："+total

document.getElementById("result").innerText = text

}

function copyResult(){

let text = document.getElementById("result").innerText

navigator.clipboard.writeText(text)

alert("已複製")

}

function clearAll(){

document.getElementById("untaxed").value=""
document.getElementById("tax").value=""
document.getElementById("total").value=""
document.getElementById("result").innerText=""

}

</script>

</body>
</html>
